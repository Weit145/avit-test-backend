services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build: .
    # env_file:
    #   - .env
    depends_on:
      db:
        condition: service_healthy
    # volumes:
    # - .:/app
    ports:
      - "8080:8000"
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - app-network

  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - app
    command: ["pytest", "test/integration/test_booking_flow.py"]
    networks:
      - app-network
    profiles:
      - test

volumes:
  db_data:

networks:
  app-network:
    driver: bridge